<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Montana Map</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.21.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.21.0/mapbox-gl.js"></script>
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  </style>
</head>
<body>
<div id="map"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoidGJ1cmJ5IiwiYSI6ImNtb2F5a2VxdDBjMDgyd3B6ZWc3b21nNzQifQ.s5-qOvDT8D0LN6iYY9HLqQ';

const bounds = [
  [-116.0490, 44.3582],
  [-104.0400, 49.0010]
];

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/tburby/cmoaym6ib00bz01s0azmy2gag',

  // 🌄 Start over Intermountain West
  center: [-111.5, 44.5],
  zoom: 4.5,

  fadeDuration: 0
});

map.on('load', () => {

  map.addSource('states', {
    type: 'geojson',
    data: 'https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json'
  });

  map.addLayer({
    id: 'montana-outline',
    type: 'line',
    source: 'states',
    paint: {
      'line-color': '#000000',
      'line-width': 3
    },
    filter: ['==', ['get', 'name'], 'Montana']
  });

  // Smooth, short zoom
  setTimeout(() => {
    map.easeTo({
      center: [-110.5, 47],
      zoom: 6.0,
      duration: 2000,
      easing: (t) => t * t
    });

    setTimeout(() => {
      map.setMaxBounds(bounds);
    }, 2000);

  }, 800);

});
</script>

</body>
</html>
